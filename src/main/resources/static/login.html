<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenso | Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --secondary: #f8fafc;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --bg-body: #f1f5f9;
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { 
            background-color: var(--bg-body); 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-dark);
            background-image: radial-gradient(circle at center, #e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .auth-container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border);
        }

        .header { text-align: center; margin-bottom: 2rem; }
        .header h2 { color: var(--primary); font-size: 1.8rem; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .header p { color: var(--text-muted); font-size: 0.9rem; margin-top: 5px; }

        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.4rem; color: var(--text-muted); }
        input { 
            width: 100%; padding: 0.75rem; border: 1px solid var(--border); 
            border-radius: 6px; font-size: 0.95rem; background: var(--bg-body); color: var(--text-dark);
            transition: all 0.2s;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        
        button { 
            width: 100%; padding: 0.75rem; border: none; border-radius: 6px; font-size: 1rem; 
            font-weight: 600; cursor: pointer; transition: all 0.2s; background-color: var(--primary); 
            color: white; margin-top: 10px;
        }
        button:hover { background-color: var(--primary-hover); }

        .toggle-text {
            text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);
        }
        .toggle-text a {
            color: var(--primary); font-weight: 600; text-decoration: none; cursor: pointer;
        }
        .toggle-text a:hover { text-decoration: underline; }

        .error-message {
            color: #ef4444; background: #fee2e2; padding: 0.5rem; border-radius: 6px;
            font-size: 0.85rem; text-align: center; margin-bottom: 1rem; display: none;
        }
        .success-message {
            color: #10b981; background: #d1fae5; padding: 0.5rem; border-radius: 6px;
            font-size: 0.85rem; text-align: center; margin-bottom: 1rem; display: none;
        }

        /* Hide register form by default */
        #registerForm { display: none; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="header">
        <h2>💳 Expenso</h2>
        <p id="subtitle">Sign in to manage your budget</p>
    </div>

    <div id="errorAlert" class="error-message"></div>
    <div id="successAlert" class="success-message"></div>

    <form id="loginForm" action="/login" method="POST">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required placeholder="Enter your username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required placeholder="Enter your password">
        </div>
        <button type="submit">Sign In</button>
        <p class="toggle-text">Don't have an account? <a onclick="toggleForms('register')">Sign up here</a></p>
    </form>

    <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
            <label>Choose a Username</label>
            <input type="text" id="reg-username" required placeholder="Create a username">
        </div>
        <div class="form-group">
            <label>Create a Password</label>
            <input type="password" id="reg-password" required placeholder="Create a strong password">
        </div>
        <button type="submit">Create Account</button>
        <p class="toggle-text">Already have an account? <a onclick="toggleForms('login')">Sign in here</a></p>
    </form>
</div>

<script>
    // Check URL parameters to see if Spring Security sent us here with an error
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('error')) {
        const errorAlert = document.getElementById('errorAlert');
        errorAlert.textContent = "Invalid username or password.";
        errorAlert.style.display = 'block';
    }

    // Toggle between Login and Register views
    function toggleForms(view) {
        document.getElementById('errorAlert').style.display = 'none';
        document.getElementById('successAlert').style.display = 'none';
        
        if (view === 'register') {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('subtitle').textContent = "Create a new account";
        } else {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('subtitle').textContent = "Sign in to manage your budget";
        }
    }

    // Handle Registration API call
    async function handleRegister(event) {
        event.preventDefault(); // Prevent standard form submission
        
        const errorAlert = document.getElementById('errorAlert');
        const successAlert = document.getElementById('successAlert');
        errorAlert.style.display = 'none';
        successAlert.style.display = 'none';

        const usernameVal = document.getElementById('reg-username').value;
        const passwordVal = document.getElementById('reg-password').value;

        try {
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: usernameVal, password: passwordVal })
            });

            const text = await response.text();

            if (response.ok) {
                // Clear the form and show success message
                document.getElementById('reg-username').value = '';
                document.getElementById('reg-password').value = '';
                
                // Switch back to login view automatically
                toggleForms('login');
                successAlert.textContent = text + " You can now sign in.";
                successAlert.style.display = 'block';
            } else {
                // Show error message (e.g., username already taken)
                errorAlert.textContent = text;
                errorAlert.style.display = 'block';
            }
        } catch (error) {
            errorAlert.textContent = "An error occurred connecting to the server.";
            errorAlert.style.display = 'block';
        }
    }
</script>

</body>
</html>
